<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CD Vault Builder</title>

<style>
  body {
    font-family: system-ui;
    background: #121212;
    color: white;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
  }

  textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    border-radius: 8px;
    padding: 10px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  pre {
    background: #1e1e1e;
    padding: 15px;
    border-radius: 10px;
    overflow: auto;
  }
</style>
</head>

<body>

<h1>CD Vault Builder</h1>

<input id="spotify" placeholder="Spotify album URL" />
<input id="album" placeholder="Album name" />
<input id="artist" placeholder="Artist name" />
<input id="image" placeholder="Album image URL (paste from Spotify)" />
<input id="year" placeholder="Year (optional)" />
<input id="tags" placeholder="Tags (comma separated)" />

<button onclick="build()">Generate JSON</button>

<pre id="output"></pre>

<script>
function build() {
  const albumObj = {
    album: document.getElementById("album").value,
    artist: document.getElementById("artist").value,
    year: document.getElementById("year").value || null,
    tags: document.getElementById("tags").value
      .split(",")
      .map(t => t.trim())
      .filter(Boolean),
    image: document.getElementById("image").value,
    spotify: document.getElementById("spotify").value
  };

  document.getElementById("output").textContent =
    JSON.stringify(albumObj, null, 2);
}
</script>

</body>
</html>
