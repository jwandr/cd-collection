<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CD Vault Builder</title>

<style>
  body {
    font-family: system-ui;
    background: #121212;
    color: white;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    cursor: pointer;
    background: white;
    color: black;
    font-weight: bold;
  }

  .card {
    margin-top: 20px;
    padding: 15px;
    background: #1e1e1e;
    border-radius: 12px;
  }

  img {
    width: 160px;
    border-radius: 10px;
    display: block;
    margin-bottom: 10px;
  }

  .row {
    margin: 6px 0;
    font-size: 14px;
  }

  .click {
    cursor: pointer;
    color: #4da3ff;
  }

  pre {
    background: #000;
    padding: 10px;
    border-radius: 8px;
    overflow: auto;
  }
</style>
</head>

<body>

<h1>CD Vault Builder</h1>

<input id="spotify" placeholder="Paste Spotify album URL" />
<button onclick="build()">Generate</button>

<div id="output"></div>

<script>
function extractId(url) {
  const match = url.match(/album\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

async function fetchEmbed(id) {
  const res = await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/album/${id}`);
  return res.json();
}

function copy(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

async function build() {
  const url = document.getElementById("spotify").value;
  const id = extractId(url);

  if (!id) {
    alert("Invalid Spotify album URL");
    return;
  }

  let data;
  try {
    data = await fetchEmbed(id);
  } catch (e) {
    alert("Could not fetch album data (Spotify blocked request)");
    return;
  }

  const albumObj = {
    album: data.title,
    artist: data.author_name,
    image: data.thumbnail_url,
    spotify: url,
    tags: []
  };

  document.getElementById("output").innerHTML = `
    <div class="card">
      <img src="${albumObj.image}" />

      <div class="row"><b>Album:</b> ${albumObj.album}</div>
      <div class="row"><b>Artist:</b> ${albumObj.artist}</div>

      <div class="row click" onclick="copy('${albumObj.image}')">
        📋 Click to copy image URL
      </div>

      <div class="row click" onclick="copy(JSON.stringify(${JSON.stringify(albumObj)}, null, 2))">
        📋 Copy JSON object
      </div>

      <pre>${JSON.stringify(albumObj, null, 2)}</pre>
    </div>
  `;
}
</script>

</body>
</html>
