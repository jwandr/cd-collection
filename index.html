<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The CD Vault</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #ffffff;
    color: #111;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 16px;
  }

  input, select, button {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: white;
    color: #111;
  }

  button {
    cursor: pointer;
  }

  /* TAGS */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 0 20px 10px;
  }

  .tag {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 12px;
    user-select: none;
  }

  .tag.active {
    background: #111;
    color: #fff;
  }

  /* SPOTLIGHT */
  .spotlight {
    display: flex;
    justify-content: center;
    padding: 10px 20px 0;
  }

  .spotlight-card {
    width: 220px;
    cursor: pointer;
    text-align: center;
  }

  .spotlight-card img {
    width: 100%;
    border-radius: 12px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    padding: 16px;
  }

  .tile {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .tile:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }

  /* SECTION TILE */
  .section-tile {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f3f3;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 600;
  }

  /* =========================
   MOBILE OPTIMISATION
========================= */

@media (max-width: 768px) {

  h1 {
    font-size: 22px;
  }

  .controls {
    flex-direction: column;
    align-items: stretch;
  }

  input, select, button {
    width: 100%;
    font-size: 14px;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .title {
    font-size: 12px;
  }

  .artist {
    font-size: 10px;
  }

  .spotlight-card {
    width: 160px;
  }

  .section-tile {
    font-size: clamp(18px, 6vw, 28px);
  }
}

.tile {
  cursor: pointer;
  transition: transform 0.15s ease;
}

.tile:active {
  transform: scale(0.96);
}

</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<div id="spotlight" class="spotlight"></div>

<div class="controls">
  <input id="search" placeholder="Search album or artist..." />

  <select id="sort">
    <option value="artist">Sort: Artist A–Z</option>
    <option value="album">Sort: Album A–Z</option>
    <option value="year">Sort: Year</option>
  </select>

  <button onclick="shuffleSpotlight()">🎲 Shuffle Spotlight</button>
</div>

<div id="tags" class="tags"></div>
<div id="grid" class="grid"></div>

<script src="albums.js"></script>

<script>
/* =========================
   STATE
========================= */

const state = {
  search: "",
  sort: "artist",
  activeTags: new Set(),
  spotlight: null
};

/* =========================
   HELPERS
========================= */

function normalize(text) {
  return text.toLowerCase().replace(/^the\s+/i, "");
}

function getLetter(text) {
  return normalize(text)[0]?.toUpperCase() || "#";
}

function getDecade(year) {
  return year ? `${Math.floor(year / 10) * 10}s` : "Unknown";
}

/* =========================
   TAGS
========================= */

function initTags() {
  const uniqueTags = [...new Set(albums.flatMap(a => a.tags || []))].sort();
  const container = document.getElementById("tags");

  uniqueTags.forEach(tag => {
    const el = document.createElement("div");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = () => {
      if (state.activeTags.has(tag)) {
        state.activeTags.delete(tag);
        el.classList.remove("active");
      } else {
        state.activeTags.add(tag);
        el.classList.add("active");
      }
      render();
    };

    container.appendChild(el);
  });
}

/* =========================
   FILTER + SORT
========================= */

function getFilteredAlbums() {
  return albums
    .filter(a => {
      const matchesSearch =
        (a.album + a.artist)
          .toLowerCase()
          .includes(state.search.toLowerCase());

      const matchesTags =
        state.activeTags.size === 0 ||
        [...state.activeTags].every(tag =>
          (a.tags || []).includes(tag)
        );

      return matchesSearch && matchesTags;
    })
    .sort((a, b) => {
      switch (state.sort) {
        case "artist":
          return normalize(a.artist).localeCompare(normalize(b.artist));

        case "album":
          return normalize(a.album).localeCompare(normalize(b.album));

        case "year":
          return (a.year || 0) - (b.year || 0);

        default:
          return 0;
      }
    });
}

/* =========================
   SPOTLIGHT
========================= */

function shuffleSpotlight() {
  const list = getFilteredAlbums();
  state.spotlight = list[Math.floor(Math.random() * list.length)];
  renderSpotlight();
}

function renderSpotlight() {
  const el = document.getElementById("spotlight");

  if (!state.spotlight) {
    el.innerHTML = "";
    return;
  }

  const a = state.spotlight;

  el.innerHTML = `
    <div class="spotlight-card" onclick="window.open('${a.spotify}', '_blank')">
      <img src="${a.image}">
      <div class="title">${a.album}</div>
      <div class="artist">${a.artist}</div>
    </div>
  `;
}

/* =========================
   GRID RENDER
========================= */

function render() {
  const grid = document.getElementById("grid");
  const list = getFilteredAlbums();

  grid.innerHTML = "";

  let lastSection = null;

  list.forEach(a => {

    let section;

    if (state.sort === "artist") section = getLetter(a.artist);
    else if (state.sort === "album") section = getLetter(a.album);
    else if (state.sort === "year") section = getDecade(a.year);

    if (section !== lastSection) {
      const s = document.createElement("div");
      s.className = "tile section-tile";
      s.textContent = section;
      grid.appendChild(s);
      lastSection = section;
    }

    const div = document.createElement("div");
    div.className = "tile";

    div.innerHTML = `
      <img src="${a.image}">
      <div class="title">${a.album}</div>
      <div class="artist">${a.artist}</div>
    `;

    div.onclick = () => window.open(a.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* =========================
   EVENTS
========================= */

document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

/* =========================
   INIT
========================= */

initTags();
render();
shuffleSpotlight();

</script>

</body>
</html>
