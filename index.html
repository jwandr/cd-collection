<!DOCTYPE html>
<html>
<head>
  <title>CD Collection</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
    .album { cursor: pointer; }
    img { width: 100%; border-radius: 10px; }
  </style>
</head>
<body>

<h1>The CD Vault</h1>
<div class="grid" id="grid"></div>

<script>
const CLIENT_ID = "YOUR_CLIENT_ID";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const PLAYLIST_ID = "51L8w7t8NfzEqlMzyJ3paq";

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest("SHA-256", data);
}

function base64urlencode(a) {
  return btoa(String.fromCharCode(...new Uint8Array(a)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

async function generatePKCE() {
  const verifier = base64urlencode(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = base64urlencode(await sha256(verifier));
  return { verifier, challenge };
}

async function redirectToAuth() {
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem("verifier", verifier);

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    code_challenge_method: "S256",
    code_challenge: challenge,
    scope: "playlist-read-private"
  });

  window.location = `https://accounts.spotify.com/authorize?${params}`;
}

async function getToken(code) {
  const verifier = localStorage.getItem("verifier");

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    })
  });

  const data = await res.json();
  return data.access_token;
}

async function fetchAlbums(token) {
  let url = `https://api.spotify.com/v1/playlists/${PLAYLIST_ID}/tracks?limit=100`;
  let albums = {};

  while (url) {
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    data.items.forEach(item => {
      if (!item.track) return;

      const album = item.track.album;

      albums[album.id] = {
        name: album.name,
        image: album.images[0]?.url,
        url: album.external_urls.spotify
      };
    });

    url = data.next;
  }

  return Object.values(albums);
}

function render(albums) {
  const grid = document.getElementById("grid");

  albums.forEach(album => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `<img src="${album.image}" /><p>${album.name}</p>`;

    div.onclick = () => window.open(album.url, "_blank");

    grid.appendChild(div);
  });
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if (!code) {
    await redirectToAuth();
  } else {
    const token = await getToken(code);
    const albums = await fetchAlbums(token);
    render(albums);
  }
}

init();
</script>

</body>
</html>
