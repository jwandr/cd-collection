<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The CD Vault</title>

<style>
  /* =========================
     GLOBAL RESET (IMPORTANT)
  ========================= */

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: -apple-system, system-ui, sans-serif;
    background: #fff;
    color: #111;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  /* =========================
     CONTROLS (FIXED GRID)
  ========================= */

  .controls {
    display: grid;
    grid-template-columns: 1fr 180px 140px;
    gap: 10px;
    padding: 10px 16px;
    align-items: center;
  }

  .search-wrapper {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .search-wrapper input {
    width: 100%;
    padding: 10px 10px 10px 34px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    font-size: 14px;
  }

  select, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: white;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }

  /* =========================
     FILTERS
  ========================= */

  .filters {
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .filters.hidden {
    max-height: 0;
    opacity: 0;
    padding: 0 16px;
  }

  .filters.open {
    max-height: 220px;
    opacity: 1;
    padding: 10px 16px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .tag {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 12px;
  }

  .tag.active {
    background: #111;
    color: #fff;
  }

  /* =========================
     SPOTLIGHT
  ========================= */

  .spotlight {
    display: flex;
    justify-content: center;
    padding: 20px 20px 0;
  }

  .spotlight-layout {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 420px;
  }

  .spotlight-card {
    width: 220px;
    text-align: center;
    cursor: pointer;
  }

  .spotlight-card img {
    width: 100%;
    border-radius: 12px;
  }

  .shuffle-btn {
    height: 42px;
    width: 42px;
    border-radius: 50%;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* =========================
     GRID
  ========================= */

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    padding: 16px;
  }

  .tile {
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .tile:hover {
    transform: scale(1.05);
  }

  .tile:active {
    transform: scale(0.96);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }

  .section-tile {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f3f3;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 600;
  }

  /* =========================
     MOBILE FIX
  ========================= */

  @media (max-width: 768px) {

    h1 {
      font-size: 22px;
    }

    .controls {
      grid-template-columns: 1fr;
    }

    .grid {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .spotlight-card {
      width: 160px;
    }

    .spotlight-layout {
      justify-content: center;
    }
  }
</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<!-- SPOTLIGHT -->
<div id="spotlight" class="spotlight"></div>

<!-- CONTROLS -->
<div class="controls">

  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input id="search" placeholder="Search album or artist..." />
  </div>

  <select id="sort">
    <option value="artist">↕️ Sort: Artist A–Z</option>
    <option value="album">↕️ Sort: Album A–Z</option>
    <option value="year">↕️ Sort: Year</option>
  </select>

  <button id="filterBtn" onclick="toggleFilters()">⏷ Filters</button>

</div>

<!-- FILTERS -->
<div id="filters" class="filters hidden">
  <div id="tags" class="tags"></div>
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

<script src="albums.js"></script>

<script>
const state = {
  search: "",
  sort: "artist",
  activeTags: new Set(),
  spotlight: null
};

/* HELPERS */
function normalize(text) {
  return text.toLowerCase().replace(/^the\s+/i, "");
}

function getLetter(text) {
  return normalize(text)[0]?.toUpperCase() || "#";
}

function getDecade(year) {
  return year ? `${Math.floor(year / 10) * 10}s` : "Unknown";
}

/* FILTER TOGGLE */
function toggleFilters() {
  const el = document.getElementById("filters");
  el.classList.toggle("hidden");
  el.classList.toggle("open");
}

/* TAGS */
function initTags() {
  const uniqueTags = [...new Set(albums.flatMap(a => a.tags || []))].sort();
  const container = document.getElementById("tags");

  uniqueTags.forEach(tag => {
    const el = document.createElement("div");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = () => {
      if (state.activeTags.has(tag)) {
        state.activeTags.delete(tag);
        el.classList.remove("active");
      } else {
        state.activeTags.add(tag);
        el.classList.add("active");
      }
      updateFilterButton();
      render();
    };

    container.appendChild(el);
  });
}

function updateFilterButton() {
  const btn = document.getElementById("filterBtn");
  const count = state.activeTags.size;

  btn.textContent = count > 0
    ? `⏷ Filters (${count})`
    : `⏷ Filters`;
}

/* DATA */
function getFilteredAlbums() {
  return albums
    .filter(a => {
      const matchesSearch =
        (a.album + a.artist)
          .toLowerCase()
          .includes(state.search.toLowerCase());

      const matchesTags =
        state.activeTags.size === 0 ||
        [...state.activeTags].every(tag =>
          (a.tags || []).includes(tag)
        );

      return matchesSearch && matchesTags;
    })
    .sort((a, b) => {
      switch (state.sort) {
        case "artist":
          return normalize(a.artist).localeCompare(normalize(b.artist));
        case "album":
          return normalize(a.album).localeCompare(normalize(b.album));
        case "year":
          return (a.year || 0) - (b.year || 0);
        default:
          return 0;
      }
    });
}

/* SPOTLIGHT */
function shuffleSpotlight() {
  const list = getFilteredAlbums();
  state.spotlight = list[Math.floor(Math.random() * list.length)];
  renderSpotlight();
}

function renderSpotlight() {
  const el = document.getElementById("spotlight");

  if (!state.spotlight) return (el.innerHTML = "");

  const a = state.spotlight;

  el.innerHTML = `
    <div class="spotlight-layout">
      <div style="width:42px;"></div>

      <div class="spotlight-card" onclick="window.open('${a.spotify}', '_blank')">
        <img src="${a.image}">
        <div class="title">${a.album}</div>
        <div class="artist">${a.artist}</div>
      </div>

      <button class="shuffle-btn" onclick="shuffleSpotlight()">🎲</button>
    </div>
  `;
}

/* GRID */
function render() {
  const grid = document.getElementById("grid");
  const list = getFilteredAlbums();

  grid.innerHTML = "";

  let lastSection = null;

  list.forEach(a => {

    let section;

    if (state.sort === "artist") section = getLetter(a.artist);
    else if (state.sort === "album") section = getLetter(a.album);
    else if (state.sort === "year") section = getDecade(a.year);

    if (section !== lastSection) {
      const s = document.createElement("div");
      s.className = "tile section-tile";
      s.textContent = section;
      grid.appendChild(s);
      lastSection = section;
    }

    const div = document.createElement("div");
    div.className = "tile";

    div.innerHTML = `
      <img src="${a.image}">
      <div class="title">${a.album}</div>
      <div class="artist">${a.artist}</div>
    `;

    div.onclick = () => window.open(a.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* EVENTS */
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

/* INIT */
initTags();
updateFilterButton();
render();
shuffleSpotlight();
</script>

</body>
</html>
