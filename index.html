<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CD Collection</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #121212;
    color: white;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .album {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .album:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>

<body>

<h1>The CD Vault</h1>
<div id="grid" class="grid"></div>

<script>
/* =======================
   CONFIG
======================= */
const CLIENT_ID = "acbe3982f5054ea4a49c9d694d79f61d";
const REDIRECT_URI = "https://jwandr.github.io/cd-collection/";
const PLAYLIST_ID = "51L8w7t8NfzEqlMzyJ3paq";

/* =======================
   PKCE HELPERS
======================= */
function generateRandomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest('SHA-256', data);
}

function base64encode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

/* =======================
   AUTH FLOW
======================= */
async function login() {
  // prevent loop if already returning from auth
  if (window.location.search.includes("code=")) return;

  const verifier = generateRandomString(64);
  localStorage.setItem("verifier", verifier);

  const challenge = base64encode(await sha256(verifier));

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    code_challenge_method: "S256",
    code_challenge: challenge,
    scope: "playlist-read-private"
  });

  window.location.href =
    "https://accounts.spotify.com/authorize?" + params.toString();
}

async function getToken(code) {
  const verifier = localStorage.getItem("verifier");

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code: code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    })
  });

  const data = await res.json();
  console.log("TOKEN RESPONSE:", data);

  if (!data.access_token) {
    throw new Error(data.error_description || "Token exchange failed");
  }

  return data.access_token;
}

/* =======================
   SPOTIFY API
======================= */
async function fetchAlbums(token) {
  let url =
    `https://api.spotify.com/v1/playlists/${PLAYLIST_ID}/tracks?limit=100`;

  let albums = {};

  while (url) {
    const res = await fetch(url, {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const data = await res.json();

    if (data.error) {
      console.error("Spotify API error:", data.error);
      throw new Error(data.error.message);
    }

    (data.items || []).forEach(item => {
      if (!item.track || !item.track.album) return;

      const album = item.track.album;

      albums[album.id] = {
        name: album.name,
        image: album.images?.[0]?.url,
        url: album.external_urls.spotify
      };
    });

    url = data.next;
  }

  return Object.values(albums);
}

/* =======================
   UI
======================= */
function render(albums) {
  const grid = document.getElementById("grid");

  grid.innerHTML = "";

  albums.forEach(album => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `
      <img src="${album.image}">
      <div class="title">${album.name}</div>
    `;

    div.onclick = () => window.open(album.url, "_blank");

    grid.appendChild(div);
  });
}

/* =======================
   INIT
======================= */
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const error = params.get("error");

  if (error) {
    console.error("Spotify auth error:", error);
    alert("Login failed: " + error);
    return;
  }

  try {
    if (!code) {
      await login();
      return;
    }

    const token = await getToken(code);

    // clean URL safely (DO NOT break path)
    window.history.replaceState({}, document.title, REDIRECT_URI);

    const albums = await fetchAlbums(token);
    render(albums);

  } catch (e) {
    console.error("Init failed:", e);
    alert("Something went wrong. Check console.");
  }
}

init();
</script>

</body>
</html>
