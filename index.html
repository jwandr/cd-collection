<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The CD Vault</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #121212;
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 20px 20px;
  }

  input, select {
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .section-label {
    grid-column: 1 / -1;
    font-size: 14px;
    opacity: 0.8;
    margin: 20px 0 5px;
    letter-spacing: 1px;
  }

  .album {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .album:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: linear-gradient(135deg, #333, #111);
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }

  .placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #222;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<div class="controls">
  <input id="search" placeholder="Search album or artist..." />

  <select id="sort">
    <option value="album">Sort: Album A–Z</option>
    <option value="artist">Sort: Artist A–Z</option>
    <option value="year">Sort: Year</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<script src="albums.js"></script>

<script>
/* =========================
   STATE
========================= */

let state = {
  search: "",
  sort: "album"
};

/* =========================
   HELPERS
========================= */

function normalizeTitle(title) {
  return title.toLowerCase().replace(/^the\s+/i, "");
}

function getInitialLetter(title) {
  return normalizeTitle(title)[0].toUpperCase();
}

function getDecade(year) {
  if (!year) return "Unknown";
  return `${Math.floor(year / 10) * 10}s`;
}

/* =========================
   FILTER + SORT
========================= */

function getFilteredAlbums() {
  return albums
    .filter(a =>
      (a.album + a.artist)
        .toLowerCase()
        .includes(state.search.toLowerCase())
    )
    .sort((a, b) => {
      switch (state.sort) {

        case "artist":
          return normalizeTitle(a.artist)
            .localeCompare(normalizeTitle(b.artist));

        case "year":
          return (a.year || 0) - (b.year || 0);

        default:
          return normalizeTitle(a.album)
            .localeCompare(normalizeTitle(b.album));
      }
    });
}

/* =========================
   RENDER
========================= */

function render() {
  const grid = document.getElementById("grid");
  const list = getFilteredAlbums();

  grid.innerHTML = "";

  let lastSection = null;

  list.forEach(album => {

    // SECTION HEADERS
    let section = "";

    if (state.sort === "album") {
      section = getInitialLetter(album.album);
    }

    if (state.sort === "artist") {
      section = getInitialLetter(album.artist);
    }

    if (state.sort === "year") {
      section = getDecade(album.year);
    }

    if (section !== lastSection) {
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = section;
      grid.appendChild(label);
      lastSection = section;
    }

    // ALBUM TILE
    const div = document.createElement("div");
    div.className = "album";

    const imgSrc = album.image || "";

    div.innerHTML = `
      ${imgSrc
        ? `<img src="${imgSrc}" alt="${album.album}">`
        : `<div class="placeholder">No image</div>`
      }
      <div class="title">${album.album}</div>
      <div class="artist">${album.artist}</div>
    `;

    div.onclick = () => window.open(album.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* =========================
   EVENTS
========================= */

document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

/* =========================
   INIT
========================= */

render();

</script>

</body>
</html>
