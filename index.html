<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The CD Vault</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #121212;
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 20px 20px;
  }

  input, select {
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .album {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .album:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
    line-height: 1.2;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }
</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<div class="controls">
  <input id="search" placeholder="Search album or artist..." />

  <select id="sort">
    <option value="album">Sort: Album A–Z</option>
    <option value="artist">Sort: Artist A–Z</option>
    <option value="year">Sort: Year</option>
  </select>

  <select id="genre">
    <option value="all">All Genres</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<script>
/* =========================
   STATIC DATA (EDIT THIS)
========================= */

const albums = [
  {
    album: "OK Computer",
    artist: "Radiohead",
    year: 1997,
    genre: "Alternative",
    image: "https://i.scdn.co/image/ab67616d0000b273c1b6a2a2f9f4d3f1c8f5c1a2",
    spotify: "https://open.spotify.com/album/4xWXI3gVZ8T7d1xQ7Z5Q5J"
  },
  {
    album: "Random Access Memories",
    artist: "Daft Punk",
    year: 2013,
    genre: "Electronic",
    image: "https://i.scdn.co/image/ab67616d0000b273c1b6a2a2f9f4d3f1c8f5c1a2",
    spotify: "https://open.spotify.com/album/4m2880jivSbbyEGAKfITCa"
  },
  {
    album: "In Rainbows",
    artist: "Radiohead",
    year: 2007,
    genre: "Alternative",
    image: "https://i.scdn.co/image/ab67616d0000b273c1b6a2a2f9f4d3f1c8f5c1a2",
    spotify: "https://open.spotify.com/album/5vkqYmi5m8fG8v7y7f7f7f"
  }
];

/* =========================
   STATE
========================= */

let state = {
  search: "",
  sort: "album",
  genre: "all"
};

/* =========================
   INIT UI
========================= */

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const sort = document.getElementById("sort");
const genre = document.getElementById("genre");

/* Populate genres dynamically */
function initGenres() {
  const genres = [...new Set(albums.map(a => a.genre))];

  genres.forEach(g => {
    const opt = document.createElement("option");
    opt.value = g;
    opt.textContent = g;
    genre.appendChild(opt);
  });
}

/* =========================
   FILTER + SORT
========================= */

function getFilteredAlbums() {
  return albums
    .filter(a => {
      const matchesSearch =
        (a.album + a.artist).toLowerCase()
          .includes(state.search.toLowerCase());

      const matchesGenre =
        state.genre === "all" || a.genre === state.genre;

      return matchesSearch && matchesGenre;
    })
    .sort((a, b) => {
      switch (state.sort) {
        case "artist":
          return a.artist.localeCompare(b.artist);
        case "year":
          return a.year - b.year;
        default:
          return a.album.localeCompare(b.album);
      }
    });
}

/* =========================
   RENDER
========================= */

function render() {
  const list = getFilteredAlbums();

  grid.innerHTML = "";

  list.forEach(album => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `
      <img src="${album.image}" alt="${album.album}">
      <div class="title">${album.album}</div>
      <div class="artist">${album.artist}</div>
    `;

    div.onclick = () => window.open(album.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* =========================
   EVENTS
========================= */

search.addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

sort.addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

genre.addEventListener("change", e => {
  state.genre = e.target.value;
  render();
});

/* =========================
   START
========================= */

initGenres();
render();
</script>

</body>
</html>
