<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CD Collection</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #121212;
    color: white;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .album {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .album:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>

<body>

<h1>The CD Vault</h1>
<div id="grid" class="grid"></div>

<script>
const CLIENT_ID = "YOUR_CLIENT_ID";
const REDIRECT_URI = "http://localhost:8000";
const PLAYLIST_ID = "51L8w7t8NfzEqlMzyJ3paq";

// ---------- PKCE HELPERS ----------
function generateRandomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest('SHA-256', data);
}

function base64encode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ---------- AUTH ----------
async function login() {
  const verifier = generateRandomString(64);
  localStorage.setItem("verifier", verifier);

  const challenge = base64encode(await sha256(verifier));

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    code_challenge_method: "S256",
    code_challenge: challenge,
    scope: "playlist-read-private"
  });

  window.location = "https://accounts.spotify.com/authorize?" + params;
}

async function getToken(code) {
  const verifier = localStorage.getItem("verifier");

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code: code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    })
  });

  const data = await res.json();
  return data.access_token;
}

// ---------- DATA ----------
async function fetchAlbums(token) {
  let url = `https://api.spotify.com/v1/playlists/${PLAYLIST_ID}/tracks?limit=100`;
  let albums = {};

  while (url) {
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    data.items.forEach(item => {
      if (!item.track) return;

      const album = item.track.album;

      if (!albums[album.id]) {
        albums[album.id] = {
          name: album.name,
          image: album.images[0]?.url,
          url: album.external_urls.spotify
        };
      }
    });

    url = data.next;
  }

  return Object.values(albums);
}

// ---------- UI ----------
function render(albums) {
  const grid = document.getElementById("grid");

  albums.forEach(album => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `
      <img src="${album.image}">
      <div class="title">${album.name}</div>
    `;

    div.onclick = () => window.open(album.url, "_blank");

    grid.appendChild(div);
  });
}

// ---------- INIT ----------
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if (!code) {
    await login();
  } else {
    const token = await getToken(code);

    // Clean URL
    window.history.replaceState({}, document.title, "/");

    const albums = await fetchAlbums(token);
    render(albums);
  }
}

init();
</script>

</body>
</html>
