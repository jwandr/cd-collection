<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The CD Vault</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #121212;
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 20px 20px;
  }

  input, select {
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 0 20px 20px;
  }

  .tag {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #444;
    cursor: pointer;
    font-size: 12px;
    user-select: none;
    transition: all 0.2s ease;
  }

  .tag.active {
    background: white;
    color: black;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .album {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .album:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
    line-height: 1.2;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }
</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<div class="controls">
  <input id="search" placeholder="Search album or artist..." />

  <select id="sort">
    <option value="album">Sort: Album A–Z</option>
    <option value="artist">Sort: Artist A–Z</option>
    <option value="year">Sort: Year</option>
  </select>
</div>

<div id="tags" class="tags"></div>

<div id="grid" class="grid"></div>

<script>

/* =========================
   STATIC DATA (UPDATED)
========================= */

const albums = [
  {
    album: "OK Computer",
    artist: "Radiohead",
    year: 1997,
    tags: ["alternative", "rock", "classic"],
    image: "https://i.scdn.co/image/ab67616d0000b273c1b6a2a2f9f4d3f1c8f5c1a2",
    spotify: "https://open.spotify.com/album/4xWXI3gVZ8T7d1xQ7Z5Q5J"
  },
  {
    album: "Random Access Memories",
    artist: "Daft Punk",
    year: 2013,
    tags: ["electronic", "funk", "nostalgic"],
    image: "https://i.scdn.co/image/ab67616d0000b273c1b6a2a2f9f4d3f1c8f5c1a2",
    spotify: "https://open.spotify.com/album/4m2880jivSbbyEGAKfITCa"
  },
  {
    album: "In Rainbows",
    artist: "Radiohead",
    year: 2007,
    tags: ["alternative", "experimental", "dreamy"],
    image: "https://i.scdn.co/image/ab67616d0000b273c1b6a2a2f9f4d3f1c8f5c1a2",
    spotify: "https://open.spotify.com/album/5vkqYmi5m8fG8v7y7f7f7f"
  }
];

/* =========================
   STATE
========================= */

let state = {
  search: "",
  sort: "album",
  activeTags: new Set()
};

/* =========================
   DOM
========================= */

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const sort = document.getElementById("sort");
const tagsContainer = document.getElementById("tags");

/* =========================
   INIT TAGS
========================= */

function initTags() {
  const tags = [...new Set(albums.flatMap(a => a.tags))].sort();

  tags.forEach(tag => {
    const el = document.createElement("div");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = () => {
      if (state.activeTags.has(tag)) {
        state.activeTags.delete(tag);
        el.classList.remove("active");
      } else {
        state.activeTags.add(tag);
        el.classList.add("active");
      }
      render();
    };

    tagsContainer.appendChild(el);
  });
}

/* =========================
   FILTER + SORT
========================= */

function getFilteredAlbums() {
  return albums
    .filter(a => {
      const matchesSearch =
        (a.album + a.artist).toLowerCase()
          .includes(state.search.toLowerCase());

      const matchesTags =
        state.activeTags.size === 0 ||
        [...state.activeTags].every(tag =>
          a.tags.includes(tag)
        );

      return matchesSearch && matchesTags;
    })
    .sort((a, b) => {
      switch (state.sort) {
        case "artist":
          return a.artist.localeCompare(b.artist);
        case "year":
          return a.year - b.year;
        default:
          return a.album.localeCompare(b.album);
      }
    });
}

/* =========================
   RENDER
========================= */

function render() {
  const list = getFilteredAlbums();

  grid.innerHTML = "";

  list.forEach(album => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `
      <img src="${album.image}">
      <div class="title">${album.album}</div>
      <div class="artist">${album.artist}</div>
    `;

    div.onclick = () => window.open(album.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* =========================
   EVENTS
========================= */

search.addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

sort.addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

/* =========================
   START
========================= */

initTags();
render();

</script>

</body>
</html>
