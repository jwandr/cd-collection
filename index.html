<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The CD Vault</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #121212;
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 20px;
  }

  input, select, button {
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .spotlight {
    display: flex;
    justify-content: center;
    padding: 10px 20px 0;
  }

  .spotlight-card {
    width: 220px;
    cursor: pointer;
    text-align: center;
  }

  .spotlight-card img {
    width: 100%;
    border-radius: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .tile {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .tile:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }

  /* 🔲 SECTION TILE */
  .section-tile {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1e1e1e;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    font-size: 22px;
    font-weight: bold;
    color: #aaa;
  }

  .section-sub {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 4px;
    text-align: center;
  }
</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<div class="spotlight" id="spotlight"></div>

<div class="controls">
  <input id="search" placeholder="Search album or artist..." />

  <select id="sort">
    <option value="album">Sort: Album A–Z</option>
    <option value="artist">Sort: Artist A–Z</option>
    <option value="year">Sort: Year</option>
    <option value="color">Sort: Colour Flow</option>
  </select>

  <button onclick="randomSpotlight()">🎲 Shuffle Spotlight</button>
</div>

<div id="grid" class="grid"></div>

<script src="albums.js"></script>

<script>
/* =========================
   STATE
========================= */

let state = {
  search: "",
  sort: "album",
  spotlight: null
};

/* =========================
   HELPERS
========================= */

function normalize(title) {
  return title.toLowerCase().replace(/^the\s+/i, "");
}

function letter(a) {
  return normalize(a)[0].toUpperCase();
}

function decade(y) {
  return y ? `${Math.floor(y / 10) * 10}s` : "Unknown";
}

/* 🌈 crude colour ranking (no library) */
function colorScore(hex) {
  if (!hex) return 999;

  const c = hex.replace("#", "");
  const r = parseInt(c.substring(0,2),16);
  const g = parseInt(c.substring(2,4),16);
  const b = parseInt(c.substring(4,6),16);

  // convert to pseudo-hue (very simplified)
  return Math.atan2(Math.sqrt(3)*(g-b), 2*r-g-b);
}

/* =========================
   FILTER
========================= */

function getFiltered() {
  return albums
    .filter(a =>
      (a.album + a.artist)
        .toLowerCase()
        .includes(state.search.toLowerCase())
    )
    .sort((a, b) => {

      switch (state.sort) {

        case "artist":
          return normalize(a.artist).localeCompare(normalize(b.artist));

        case "year":
          return (a.year || 0) - (b.year || 0);

        case "color":
          return colorScore(a.color) - colorScore(b.color);

        default:
          return normalize(a.album).localeCompare(normalize(b.album));
      }
    });
}

/* =========================
   SPOTLIGHT
========================= */

function randomSpotlight() {
  const list = getFiltered();
  state.spotlight = list[Math.floor(Math.random() * list.length)];
  renderSpotlight();
}

function renderSpotlight() {
  const el = document.getElementById("spotlight");

  if (!state.spotlight) {
    el.innerHTML = "";
    return;
  }

  el.innerHTML = `
    <div class="spotlight-card" onclick="window.open('${state.spotlight.spotify}','_blank')">
      <img src="${state.spotlight.image}">
      <div class="title">${state.spotlight.album}</div>
      <div class="artist">${state.spotlight.artist}</div>
    </div>
  `;
}

/* =========================
   RENDER GRID
========================= */

function render() {
  const grid = document.getElementById("grid");
  const list = getFiltered();

  grid.innerHTML = "";

  let lastSection = null;

  list.forEach(a => {

    // SECTION KEY
    let sectionKey;

    if (state.sort === "artist") sectionKey = letter(a.artist);
    else if (state.sort === "year") sectionKey = decade(a.year);
    else if (state.sort === "album") sectionKey = letter(a.album);
    else if (state.sort === "color") sectionKey = "🌈";

    // SECTION TILE (same size as album)
    if (sectionKey !== lastSection) {
      const section = document.createElement("div");
      section.className = "tile section-tile";

      let sub = "";
      if (state.sort === "year") sub = decade(a.year);

      section.innerHTML = `
        <div>
          ${sectionKey}
          <div class="section-sub">${sub}</div>
        </div>
      `;

      grid.appendChild(section);
      lastSection = sectionKey;
    }

    // ALBUM TILE
    const div = document.createElement("div");
    div.className = "tile";

    div.innerHTML = `
      <img src="${a.image}">
      <div class="title">${a.album}</div>
      <div class="artist">${a.artist}</div>
    `;

    div.onclick = () => window.open(a.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* =========================
   EVENTS
========================= */

document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

/* =========================
   INIT
========================= */

render();
randomSpotlight();

</script>

</body>
</html>
