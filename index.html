<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The CD Vault</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #ffffff;
    color: #111;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 20px;
  }

  input, select, button {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: white;
    color: #111;
    outline: none;
  }

  button {
    cursor: pointer;
  }

  /* TAGS */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 0 20px 10px;
  }

  .tag {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 12px;
    user-select: none;
    transition: all 0.2s ease;
  }

  .tag.active {
    background: #111;
    color: #fff;
  }

  /* SPOTLIGHT */
  .spotlight {
    display: flex;
    justify-content: center;
    padding: 10px 20px 0;
  }

  .spotlight-card {
    width: 220px;
    cursor: pointer;
    text-align: center;
  }

  .spotlight-card img {
    width: 100%;
    border-radius: 12px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .tile {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .tile:hover {
    transform: scale(1.05);
  }

  img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .title {
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }

  .artist {
    font-size: 11px;
    opacity: 0.7;
    text-align: center;
  }

  /* SECTION TILE (UPDATED) */
  .section-tile {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f3f3;
    border-radius: 12px;
    aspect-ratio: 1 / 1;

    font-weight: 600;
    color: #111;

    /* responsive typography */
    font-size: clamp(22px, 3vw, 36px);
    letter-spacing: 1px;
  }

</style>
</head>

<body>

<header>
  <h1>The CD Vault</h1>
</header>

<div class="spotlight" id="spotlight"></div>

<div class="controls">
  <input id="search" placeholder="Search album or artist..." />

  <select id="sort">
    <option value="album">Sort: Album A–Z</option>
    <option value="artist">Sort: Artist A–Z</option>
    <option value="year">Sort: Year</option>
    <option value="color">Sort: Colour Flow</option>
  </select>

  <button onclick="randomSpotlight()">🎲 Shuffle Spotlight</button>
</div>

<div id="tags" class="tags"></div>
<div id="grid" class="grid"></div>

<script src="albums.js"></script>

<script>
let state = {
  search: "",
  sort: "artist",
  activeTags: new Set(),
  spotlight: null
};

function normalize(t) {
  return t.toLowerCase().replace(/^the\s+/i, "");
}

function letter(t) {
  return normalize(t)[0].toUpperCase();
}

function decade(y) {
  return y ? `${Math.floor(y / 10) * 10}s` : "Unknown";
}

function rgbToHue(r, g, b) {
  r /= 255; g /= 255; b /= 255;

  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const delta = max - min;

  let h = 0;

  if (delta === 0) return 0;

  if (max === r) {
    h = ((g - b) / delta) % 6;
  } else if (max === g) {
    h = (b - r) / delta + 2;
  } else {
    h = (r - g) / delta + 4;
  }

  h = Math.round(h * 60);
  if (h < 0) h += 360;

  return h;
}

function isGrey(r, g, b) {
  return Math.abs(r - g) < 10 && Math.abs(g - b) < 10;
}

function colorScore(hex) {
  if (!hex) return 999;

  const c = hex.replace("#", "");
  const r = parseInt(c.slice(0,2),16);
  const g = parseInt(c.slice(2,4),16);
  const b = parseInt(c.slice(4,6),16);

  if (isGrey(r, g, b)) return 1000;

  return rgbToHue(r, g, b);
}

/* TAGS */
function initTags() {
  const tags = [...new Set(albums.flatMap(a => a.tags || []))].sort();
  const wrap = document.getElementById("tags");

  tags.forEach(tag => {
    const el = document.createElement("div");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = () => {
      if (state.activeTags.has(tag)) {
        state.activeTags.delete(tag);
        el.classList.remove("active");
      } else {
        state.activeTags.add(tag);
        el.classList.add("active");
      }
      render();
    };

    wrap.appendChild(el);
  });
}

/* FILTER */
function getFiltered() {
  return albums
    .filter(a => {
      const matchesSearch =
        (a.album + a.artist)
          .toLowerCase()
          .includes(state.search.toLowerCase());

      const matchesTags =
        state.activeTags.size === 0 ||
        [...state.activeTags].every(t =>
          (a.tags || []).includes(t)
        );

      return matchesSearch && matchesTags;
    })
    .sort((a, b) => {
      switch (state.sort) {
        case "artist":
          return normalize(a.artist).localeCompare(normalize(b.artist));

        case "year":
          return (a.year || 0) - (b.year || 0);

        case "color":
          return colorScore(a.color) - colorScore(b.color);

        default:
          return normalize(a.album).localeCompare(normalize(b.album));
      }
    });
}

/* SPOTLIGHT */
function randomSpotlight() {
  const list = getFiltered();
  state.spotlight = list[Math.floor(Math.random() * list.length)];
  renderSpotlight();
}

function renderSpotlight() {
  const el = document.getElementById("spotlight");
  if (!state.spotlight) return (el.innerHTML = "");

  const a = state.spotlight;

  el.innerHTML = `
    <div class="spotlight-card" onclick="window.open('${a.spotify}','_blank')">
      <img src="${a.image}">
      <div class="title">${a.album}</div>
      <div class="artist">${a.artist}</div>
    </div>
  `;
}

/* GRID */
function render() {
  const grid = document.getElementById("grid");
  const list = getFiltered();

  grid.innerHTML = "";

  let last = null;

  list.forEach(a => {

    let section;

    if (state.sort === "artist") section = letter(a.artist);
    else if (state.sort === "album") section = letter(a.album);
    else if (state.sort === "year") section = decade(a.year);
    else section = "🌈";

    if (section !== last) {
      const s = document.createElement("div");
      s.className = "tile section-tile";
      s.textContent = section;
      grid.appendChild(s);
      last = section;
    }

    const div = document.createElement("div");
    div.className = "tile";

    div.innerHTML = `
      <img src="${a.image}">
      <div class="title">${a.album}</div>
      <div class="artist">${a.artist}</div>
    `;

    div.onclick = () => window.open(a.spotify, "_blank");

    grid.appendChild(div);
  });
}

/* EVENTS */
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

/* INIT */
initTags();
render();
randomSpotlight();

</script>

</body>
</html>
