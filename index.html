<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST's Digital CD Rack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f0efeb;
    --surface:     #ffffff;
    --border:      #e2e1db;
    --border-mid:  #c8c7c0;
    --text:        #18181b;
    --muted:       #8a8a8a;
    --subtle:      #b0afa8;
    --dark:        #18181b;
    --dark-hover:  #2c2c30;
    --accent:      #0f9e7b;
    --accent-soft: #e6f6f2;
    --bg-dark:     #e8e7e2;
  }

  html {
    overflow-x: hidden;
  }

  html, body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    padding: 24px 24px 12px;
    text-align: center;
    background: var(--bg-dark);
  }

  h1 {
    font-size: clamp(20px, 4.5vw, 32px);
    font-weight: 600;
    letter-spacing: -0.6px;
    color: var(--text);
  }

  .album-count {
    font-size: 11px;
    color: var(--subtle);
    margin-top: 5px;
    letter-spacing: 0.5px;
    font-weight: 400;
  }

  /* ── SPOTLIGHT ── */
  .spotlight {
    display: flex;
    justify-content: center;
    padding: 12px 24px 20px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border);
  }

  .spotlight-wrap {
    position: relative;
    width: 180px;
    text-align: center;
  }

  .shuffle-btn {
    position: absolute;
    top: 50%;
    right: -52px;
    transform: translateY(-60%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border-mid);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.25s;
    color: var(--muted);
    flex-shrink: 0;
  }

  .spotlight-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 12px;
  }

  .spotlight-card {
    cursor: pointer;
    display: block;
    text-decoration: none;
  }

  .spotlight-card img {
    width: 100%;
    border-radius: 10px;
    aspect-ratio: 1/1;
    object-fit: cover;
    display: block;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .spotlight-card .s-title {
    font-size: 13px;
    font-weight: 600;
    margin-top: 10px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spotlight-card .s-artist {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
  }

  /* ── RULE ── */
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 24px 0;
  }

  /* ── CONTROLS ── */
  /* ── STICKY CONTROLS ── */
  .controls-sticky {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .controls {
    padding: 12px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .controls-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* ── BACK TO TOP ── */
  .back-to-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border-mid);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, background 0.15s, color 0.15s;
    z-index: 200;
  }

  .back-to-top.visible {
    opacity: 1;
    pointer-events: auto;
  }

  @media (hover: hover) {
    .back-to-top:hover {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .shuffle-btn:hover {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
      transform: translateY(-60%) rotate(180deg);
    }

    .spotlight-card:hover img {
      transform: scale(1.03);
      box-shadow: 0 8px 28px rgba(0,0,0,0.14);
    }

    .tile:hover { transform: scale(1.04); }

    .sort-pill:hover:not(.active) {
      border-color: var(--border-mid);
      color: var(--text);
    }

    .genre-btn:hover {
      background: var(--dark);
      border-color: var(--dark);
      color: #f0efeb;
    }

    .tag:hover { border-color: var(--border-mid); color: var(--text); }
  }

  .search-wrapper { position: relative; }

  .search-wrapper input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s;
    font-weight: 400;
  }

  .search-wrapper input::placeholder { color: var(--subtle); }
  .search-wrapper input:focus { border-color: var(--border-mid); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--subtle);
    display: flex;
    align-items: center;
  }

  .ctrl-row { display: flex; gap: 6px; }

  /* Dark sort pills */
  .sort-pill {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: var(--surface);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    border: 1px solid var(--border);
  }

  .sort-pill.active {
    background: var(--dark);
    border-color: var(--dark);
    color: #f0efeb;
  }

  .genre-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .genre-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: #f0efeb;
  }

  /* ── FILTERS ── */
  .filters { overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; }
  .filters.hidden { max-height: 0; opacity: 0; }
  .filters.open   { max-height: 300px; opacity: 1; padding: 10px 16px 0; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.1px;
  }

  .tag.active {
    background: var(--dark);
    border-color: var(--dark);
    color: #f0efeb;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px;
    padding: 16px;
  }

  .tile {
    cursor: pointer;
    transition: transform 0.15s;
    text-decoration: none;
    display: block;
  }

  .tile:active { transform: scale(0.97); }

  .tile img {
    width: 100%;
    border-radius: 8px;
    aspect-ratio: 1/1;
    object-fit: cover;
    display: block;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }

  .tile .title {
    font-size: 12px;
    font-weight: 600;
    margin-top: 7px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .tile .artist {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
    font-weight: 400;
  }

  .section-tile {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 4px 6px;
    border-top: 1px solid var(--border-mid);
    cursor: default;
    margin-top: 4px;
  }

  .section-tile-letter {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 600;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
    min-width: 24px;
  }

  .section-tile-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--subtle);
    font-size: 13px;
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 600px) {
    .controls { flex-direction: row; align-items: center; flex-wrap: wrap; }
    .search-wrapper { flex: 1; min-width: 180px; }
    .controls-row { flex-shrink: 0; }
    .sort-pill { font-size: 13px; padding: 8px 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); }
    .spotlight-wrap { width: 200px; }
    .shuffle-btn { right: -52px; }
    .back-to-top { bottom: 32px; right: 32px; }
  }

  @media (min-width: 900px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(162px, 1fr)); }
    .spotlight-wrap { width: 220px; }
  }
</style>
</head>
<body>

<header>
  <h1>ST's Digital CD Rack</h1>
  <div class="album-count" id="albumCount"></div>
</header>

<div id="spotlight" class="spotlight"></div>

<div class="controls-sticky">
  <div class="controls">
    <div class="search-wrapper">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input id="search" placeholder="Search album or artist…" autocomplete="off">
    </div>
    <div class="controls-row">
      <button class="sort-pill active" data-sort="artist">Artist</button>
      <button class="sort-pill" data-sort="album">Album</button>
      <button class="sort-pill" data-sort="year">Year</button>
      <button id="filterBtn" class="genre-btn" onclick="toggleFilters()">Genres</button>
    </div>
  </div>

  <div id="filters" class="filters hidden">
    <div id="tags" class="tags"></div>
  </div>
</div>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<div id="grid" class="grid"></div>

<!-- Shuffle SVG icon (defined once, reused) -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="icon-shuffle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"/>
    <path d="M3.51 15a9 9 0 1 0 .49-4"/>
  </symbol>
</svg>

<script src="albums.js"></script>
<script>
const state = { search: "", sort: "artist", activeTags: new Set(), spotlight: null };

function normalize(t) { return t.toLowerCase().replace(/^the\s+/i, ""); }
function getLetter(t) { return normalize(t)[0]?.toUpperCase() || "#"; }
function getDecade(y) { return y ? `${Math.floor(y / 10) * 10}s` : "?"; }
function trim(t) { return t.trim(); }

function toggleFilters() {
  const el = document.getElementById("filters");
  el.classList.toggle("hidden");
  el.classList.toggle("open");
}

function initTags() {
  const tags = [...new Set(albums.flatMap(a => (a.tags || []).map(trim)))].filter(Boolean).sort();
  const container = document.getElementById("tags");
  tags.forEach(tag => {
    const el = document.createElement("button");
    el.className = "tag";
    el.textContent = tag;
    el.onclick = () => {
      state.activeTags.has(tag) ? state.activeTags.delete(tag) : state.activeTags.add(tag);
      el.classList.toggle("active");
      updateGenreBtn();
      render();
    };
    container.appendChild(el);
  });
}

function updateGenreBtn() {
  const n = state.activeTags.size;
  const btn = document.getElementById("filterBtn");
  btn.textContent = n > 0 ? `Genres (${n})` : "Genres";
  btn.classList.toggle("active", n > 0);
}

function getFiltered() {
  return albums
    .filter(a => {
      const q = state.search.toLowerCase();
      const matchSearch = a.album.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q);
      const matchTags = state.activeTags.size === 0 ||
        [...state.activeTags].every(t => (a.tags || []).map(trim).includes(t));
      return matchSearch && matchTags;
    })
    .sort((a, b) => {
      if (state.sort === "artist") return normalize(a.artist).localeCompare(normalize(b.artist));
      if (state.sort === "album")  return normalize(a.album).localeCompare(normalize(b.album));
      if (state.sort === "year")   return (a.year || 0) - (b.year || 0);
      return 0;
    });
}

function updateCount(list) {
  const el = document.getElementById("albumCount");
  el.textContent = list.length === albums.length
    ? `${albums.length} albums`
    : `Showing ${list.length} of ${albums.length}`;
}

function shuffleSpotlight() {
  const list = getFiltered();
  if (!list.length) return;
  let pick;
  do { pick = list[Math.floor(Math.random() * list.length)]; }
  while (list.length > 1 && pick === state.spotlight);
  state.spotlight = pick;
  renderSpotlight();
}

function renderSpotlight() {
  const el = document.getElementById("spotlight");
  if (!state.spotlight) return;
  const a = state.spotlight;
  el.innerHTML = `
    <div class="spotlight-wrap">
      <div class="spotlight-label">What are you in the mood for?</div>
      <a class="spotlight-card" href="${a.spotify}" target="_blank" rel="noopener">
        <img src="${a.image}" alt="${a.album}">
        <div class="s-title">${a.album}</div>
        <div class="s-artist">${a.artist}</div>
      </a>
      <button class="shuffle-btn" onclick="shuffleSpotlight()" title="Refresh">
        <svg width="16" height="16"><use href="#icon-shuffle"/></svg>
      </button>
    </div>`;
}

function render() {
  const grid = document.getElementById("grid");
  const list = getFiltered();
  updateCount(list);
  grid.innerHTML = "";

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">No albums match your search.</div>`;
    return;
  }

  let lastSection = null;
  list.forEach(album => {
    const section = state.sort === "year" ? getDecade(album.year)
      : state.sort === "album" ? getLetter(album.album)
      : getLetter(album.artist);

    if (section !== lastSection) {
      const s = document.createElement("div");
      s.className = "tile section-tile";
      s.innerHTML = `<span class="section-tile-letter">${section}</span><span class="section-tile-line"></span>`;
      grid.appendChild(s);
      lastSection = section;
    }

    const a = document.createElement("a");
    a.className = "tile";
    a.href = album.spotify;
    a.target = "_blank";
    a.rel = "noopener";
    a.innerHTML = `
      <img src="${album.image}" alt="${album.album}" loading="lazy">
      <div class="title">${album.album}</div>
      <div class="artist">${album.artist}</div>`;
    grid.appendChild(a);
  });
}

document.querySelectorAll(".sort-pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".sort-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    state.sort = p.dataset.sort;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

initTags();
updateGenreBtn();
render();
shuffleSpotlight();

const backToTop = document.getElementById("backToTop");
window.addEventListener("scroll", () => {
  backToTop.classList.toggle("visible", window.scrollY > 300);
}, { passive: true });
</script>
</body>
</html>
